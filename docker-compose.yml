services:
  backend:
    build:
      context: ./pos-backend
      dockerfile: Dockerfile
    container_name: pos-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: change-me-in-production
      MONGODB_URI: ${MONGODB_URI}
    ports:
      - "3000:3000"

  web:
    build:
      context: ./pos-web
      dockerfile: Dockerfile
    container_name: pos-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      POS_BACKEND_URL: http://backend:3000/api/v1
    ports:
      - "3010:3000"
